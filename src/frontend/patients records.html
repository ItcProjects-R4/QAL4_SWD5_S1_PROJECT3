       class="divide-y divide-slate-100">

     class="space-y-4">

    <script>

async function loadPatientRecords() {

    const token = localStorage.getItem("token");

    // Doctor Profile
    const profileResponse = await fetch(
        "https://localhost:7153/api/Doctor/profile",
        {
            headers: {
                Authorization: `Bearer ${token}`
            }
        });

    const profile = await profileResponse.json();

    document.getElementById("doctorName").innerText =
        profile.data.user.fullName;

    document.getElementById("doctorId").innerText =
        "Doctor ID: " + profile.data.id;

    document.getElementById("doctorSpecialization").innerText =
        profile.data.specialization;



    document.getElementById("doctorMiniName").innerText =
        profile.data.user.fullName;

    document.getElementById("doctorMiniSpecialization").innerText =
        profile.data.specialization;
    // Patients Table
    const patientsResponse = await fetch(
        "https://localhost:7153/api/Doctor/patients",
        {
            headers: {
                Authorization: `Bearer ${token}`
            }
        });

    const patients = await patientsResponse.json();

    const table =
        document.getElementById("patientsTableBody");

    table.innerHTML = "";

    patients.data.forEach(patient => {

        table.innerHTML += `
<tr class="hover:bg-slate-50/50">

    <td class="px-6 py-4 text-sm font-semibold text-primary">
        ${patient.fullName}
    </td>

    <td class="px-6 py-4 text-sm text-slate-600">
        ${patient.phone}
    </td>

    <td class="px-6 py-4 text-sm text-slate-600">
        ${patient.email}
    </td>

</tr>
`;
    });


    // Upcoming Appointments
    const appointmentsResponse = await fetch(
        "https://localhost:7153/api/Doctor/appointments/upcoming",
        {
            headers: {
                Authorization: `Bearer ${token}`
            }
        });

    const appointments =
        await appointmentsResponse.json();

    const upcoming =
        document.getElementById("upcomingAppointments");

    upcoming.innerHTML = "";

    appointments.data.forEach(app => {

        const date =
            new Date(app.appointmentDate);

        upcoming.innerHTML += `
            <div class="p-4 bg-slate-50 border border-slate-100 rounded-lg">

                <div class="flex justify-between mb-2">

                    <span class="text-sm font-bold text-primary">
                        ${date.toLocaleDateString()}
                    </span>

                    <span class="text-[12px] font-bold text-slate-500">
                        ${date.toLocaleTimeString([], {
                            hour: "2-digit",
                            minute: "2-digit"
                        })}
                    </span>

                </div>

                <p class="text-sm font-medium text-slate-600">
                    ${app.patientName}
                </p>

            </div>
        `;
    });
}

loadPatientRecords();

</script>
