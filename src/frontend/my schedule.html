    <script>
        let selectedPatientId = null;
        async function loadSchedule() {
            const token = localStorage.getItem("token");

            if (!token) {
                window.location.href = "login.html";
                return;
            }
            const response = await fetch(
                "https://localhost:7153/api/Doctor/appointments/upcoming",
                {
                    headers: {
                        Authorization: `Bearer ${localStorage.getItem("token")}`
                    }
                });

            const result = await response.json();
            const profileResponse = await fetch(
    "https://localhost:7153/api/Doctor/profile",
    {
        headers: {
            Authorization: `Bearer ${localStorage.getItem("token")}`
        }
    });

            const profile = await profileResponse.json();
            document.getElementById("doctorName").innerText =
                profile.data.user.fullName;

            document.getElementById("doctorSpecialization").innerText =
                profile.data.specialization;

            console.log(result);
            const today = new Date();
            const count = result.data.length;

            document.getElementById("scheduleInfo").innerText =
                today.toLocaleDateString("en-US", {
                    weekday: "long",
                    month: "long",
                    day: "numeric",
                    year: "numeric"
                }) +
                " — " +
                count +
                (count === 1
                    ? " Appointment Remaining"
                    : " Appointments Remaining");
            const scheduleList = document.getElementById("scheduleList");

            scheduleList.innerHTML = "";

            result.data.forEach(app => {

                const date = new Date(app.appointmentDate);

                const hour = date.getHours();
                const minutes = date.getMinutes();

                const displayHour = hour % 12 || 12;
                const ampm = hour >= 12 ? "PM" : "AM";

                scheduleList.innerHTML += `
           <div
    onclick='showAppointment(${JSON.stringify(app)})'
    class="bg-white rounded border border-slate-200 hover:border-slate-300 flex items-center justify-between p-4 transition-all cursor-pointer group">

                <div class="flex items-center gap-4">

                    <div class="flex flex-col items-center justify-center bg-slate-50 text-slate-400 w-14 h-14 rounded">

                        <span class="text-xl font-bold leading-none">
                            ${displayHour}
                        </span>

                        <span class="text-[10px] font-bold uppercase">
                            ${ampm}
                        </span>

                    </div>

                    <div>
                        <h3 class="font-bold text-slate-900">
                            ${app.patientName}
                        </h3>

                        <p class="text-sm text-slate-500">
                            ${app.status}
                        </p>    
                    </div>

                </div>

                <span class="material-symbols-outlined">
                    chevron_right
                </span>

            </div>
        `;
                if (result.data.length > 0) {
                    showAppointment(result.data[0]);
                }
            }
            );
        }
    function showAppointment(app) {

        selectedPatientId = app.patientId;

        document.getElementById("patientName").innerText =
            app.patientName;

        document.getElementById("patientId").innerText =
            "PATIENT ID: " + app.patientId;

        const date = new Date(app.appointmentDate);

        document.getElementById("appointmentDate").innerText =
            date.toLocaleDateString();

        document.getElementById("appointmentTime").innerText =
            date.toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });
    }
    function closeModal() {
        document.getElementById("patientModal")
            .classList.add("hidden");
    }

    async function openPatientDetails() {

        if (!selectedPatientId) return;

        const response = await fetch(
            `https://localhost:7153/api/Doctor/patients/${selectedPatientId}`,
            {
                headers: {
                    Authorization:
                        `Bearer ${localStorage.getItem("token")}`
                }
            });

        const result = await response.json();
       
        document.getElementById("patientDetails").innerHTML = `
        <p><strong>Name:</strong> ${result.data.fullName}</p>
        <p><strong>Phone:</strong> ${result.data.phone}</p>
        <p><strong>Email:</strong> ${result.data.email}</p>
        <p><strong>Gender:</strong> ${result.data.gender}</p>
        <p><strong>Medical History:</strong> ${result.data.medicalHistory}</p>
    `;

        document.getElementById("patientModal")
            .classList.remove("hidden");

        document.getElementById("patientModal")
            .classList.add("flex");
    }

        loadSchedule();
        document
            .getElementById("viewPatientBtn")
            .addEventListener("click", openPatientDetails);
</script>
    <div id="patientModal"
