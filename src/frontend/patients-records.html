<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Patient Records | SehhaTech</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
tailwind.config={darkMode:"class",theme:{extend:{colors:{"background":"#f9f9ff","surface":"#f9f9ff","primary":"#0F2544","on-primary":"#ffffff","on-surface":"#151c27","on-surface-variant":"#44474e","outline":"#74777e","outline-variant":"#c4c6cf","surface-variant":"#dce2f3","error":"#ba1a1a","secondary":"#006a60","surface-container":"#e7eefe","surface-container-low":"#f0f3ff","surface-container-high":"#e2e8f8","surface-container-highest":"#dce2f3","surface-container-lowest":"#ffffff","on-primary-container":"#798db1","inverse-primary":"#adc7f7","surface-tint":"#455f88","on-secondary":"#ffffff","secondary-container":"#90efef","on-secondary-container":"#006e6e"},borderRadius:{"DEFAULT":"4px","lg":"4px","xl":"8px","full":"9999px"},spacing:{"sm":"8px","md":"16px","container-margin":"24px","xs":"4px","xl":"32px","lg":"24px","gutter":"20px"},fontFamily:{"manrope":["Manrope","sans-serif"]}}}}
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
        }

        body {
            font-family: 'Manrope',sans-serif;
        }

        #sidebar {
            transition: transform 0.25s ease;
        }

            #sidebar.sidebar-closed {
                transform: translateX(-100%);
            }

        #mainContent, #mainHeader {
            transition: margin-left 0.25s ease,left 0.25s ease;
        }
    </style>
</head>
<body class="bg-background text-on-background font-manrope">

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-40 hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-white border-r border-slate-200 flex flex-col py-8 px-4 z-50">
        <div class="mb-8 px-2 flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg bg-primary flex items-center justify-center shadow-sm flex-shrink-0">
                <span class="material-symbols-outlined text-white text-xl" style='font-variation-settings:"FILL" 1;'>medical_services</span>
            </div>
            <span class="text-xl font-800 tracking-tight text-slate-900">SehhaTech</span>
        </div>
        <div class="mb-5 p-3 bg-slate-50 rounded-xl border border-slate-100">
            <div class="flex items-center gap-3">
                <div id="sidebarAvatar" class="w-10 h-10 rounded-full bg-primary flex items-center justify-center flex-shrink-0 overflow-hidden">
                    <span class="material-symbols-outlined text-white text-lg" style='font-variation-settings:"FILL" 1;'>person</span>
                </div>
                <div class="min-w-0">
                    <p id="sidebarName" class="text-sm font-bold text-slate-900 truncate">Loading...</p>
                    <p id="sidebarSpec" class="text-[10px] text-slate-400 font-semibold uppercase truncate"></p>
                </div>
            </div>
            <a href="doctor-profile.html" class="mt-2 flex items-center gap-1 text-xs text-slate-500 hover:text-primary font-medium">
                <span class="material-symbols-outlined text-[14px]">manage_accounts</span>View Profile
            </a>
        </div>
        <nav class="flex-1 space-y-1">
            <a class="flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded font-medium text-sm" href="doctor-dashboard.html">
                <span class="material-symbols-outlined text-[20px]">dashboard</span>Dashboard
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded font-medium text-sm" href="my-schedule.html">
                <span class="material-symbols-outlined text-[20px]">calendar_today</span>My Schedule
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 bg-primary text-white rounded font-semibold text-sm">
                <span class="material-symbols-outlined text-[20px]">folder_shared</span>Patient Records
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:bg-slate-50 rounded font-medium text-sm" href="doctor-profile.html">
                <span class="material-symbols-outlined text-[20px]">manage_accounts</span>My Profile
            </a>
        </nav>
        <div class="mt-auto border-t border-slate-100 pt-4">
            <a class="flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:text-error font-medium text-sm cursor-pointer" onclick="handleLogout()">
                <span class="material-symbols-outlined text-[20px]">logout</span>Logout
            </a>
        </div>
    </aside>

    <!-- Header -->
    <header id="mainHeader" class="bg-white border-b border-slate-200 flex items-center w-full px-6 h-16 fixed top-0 z-40 left-64" style="right:0;">
        <button id="sidebarToggle" class="p-2 rounded-lg hover:bg-slate-100 transition-colors text-slate-600 mr-4">
            <span class="material-symbols-outlined text-[22px]">menu</span>
        </button>
        <div class="flex-1"></div>
        <div class="flex items-center gap-3" onclick="window.location.href='doctor-profile.html'" style="cursor:pointer;">
            <div class="text-right hidden sm:block">
                <p id="doctorMiniName" class="text-[12px] font-extrabold text-primary leading-tight"></p>
                <p id="doctorMiniSpec" class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter"></p>
            </div>
            <div id="headerAvatar" class="w-8 h-8 rounded-full overflow-hidden border border-slate-200 bg-primary flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-sm" style='font-variation-settings:"FILL" 1;'>person</span>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main id="mainContent" class="ml-64 pt-20 pb-12 px-6 min-h-screen">
        <div class="max-w-6xl mx-auto space-y-8">

            <!-- Doctor Info -->
            <section class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
                <div class="flex flex-col md:flex-row items-start gap-5">
                    <div id="profileAvatar" class="w-16 h-16 rounded-full bg-primary flex items-center justify-center flex-shrink-0 overflow-hidden">
                        <span class="material-symbols-outlined text-white text-3xl" style='font-variation-settings:"FILL" 1;'>person</span>
                    </div>
                    <div class="flex-grow">
                        <div class="flex flex-col md:flex-row md:items-center gap-2 mb-1">
                            <h1 id="doctorName" class="text-2xl font-extrabold text-primary"></h1>
                            <span id="doctorId" class="text-[11px] font-bold text-on-primary-container bg-surface-container px-2.5 py-1 rounded tracking-wider uppercase w-fit"></span>
                        </div>
                        <p id="doctorSpec" class="text-base font-semibold text-slate-500 mb-2"></p>
                        <p id="doctorBio" class="text-sm text-slate-600 leading-relaxed max-w-2xl"></p>
                    </div>
                </div>
            </section>

            <!-- Tab -->
            <nav class="flex border-b border-slate-200">
                <button class="px-8 py-3 text-sm font-bold text-primary border-b-2 border-primary">Patients & Appointments</button>
            </nav>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Patients Table -->
                <section class="lg:col-span-8 bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                    <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center">
                        <h2 class="text-lg font-extrabold text-primary">My Patients</h2>
                        <span id="patientCount" class="text-xs text-slate-400 font-semibold"></span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-100">
                                    <th class="px-6 py-3 text-[11px] font-bold text-slate-500 uppercase tracking-wider">Patient</th>
                                    <th class="px-6 py-3 text-[11px] font-bold text-slate-500 uppercase tracking-wider">Phone</th>
                                    <th class="px-6 py-3 text-[11px] font-bold text-slate-500 uppercase tracking-wider">Email</th>
                                    <th class="px-6 py-3 text-[11px] font-bold text-slate-500 uppercase tracking-wider">Gender</th>
                                </tr>
                            </thead>
                            <tbody id="patientsTableBody" class="divide-y divide-slate-100">
                                <tr><td colspan="4" class="px-6 py-4 text-slate-400 text-sm">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Upcoming -->
                <aside class="lg:col-span-4">
                    <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-6">
                        <div class="flex items-center gap-2 mb-5">
                            <span class="material-symbols-outlined text-primary text-[20px]">event</span>
                            <h2 class="text-lg font-extrabold text-primary">Upcoming</h2>
                        </div>
                        <div id="upcomingAppointments" class="space-y-3">
                            <p class="text-slate-400 text-sm">Loading...</p>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <script>
const API="http://localhost:5099";
const token=localStorage.getItem("token")||sessionStorage.getItem("token");

function setSidebar(open){
    const s=document.getElementById("sidebar"),o=document.getElementById("sidebarOverlay"),
          m=document.getElementById("mainContent"),h=document.getElementById("mainHeader"),
          mob=window.innerWidth<768;
    if(open){s.classList.remove("sidebar-closed");if(mob){o.classList.remove("hidden");m.style.marginLeft="0";h.style.left="0";}else{m.style.marginLeft="16rem";h.style.left="16rem";}}
    else{s.classList.add("sidebar-closed");o.classList.add("hidden");m.style.marginLeft="0";h.style.left="0";}
    if(!mob)localStorage.setItem("sidebarOpen",open);
}
function initSidebar(){
    const mob=window.innerWidth<768,saved=localStorage.getItem("sidebarOpen");
    setSidebar(mob?false:(saved===null?true:saved==="true"));
    document.getElementById("sidebarToggle").addEventListener("click",()=>setSidebar(document.getElementById("sidebar").classList.contains("sidebar-closed")));
    document.getElementById("sidebarOverlay").addEventListener("click",()=>setSidebar(false));
    window.addEventListener("resize",()=>{if(window.innerWidth>=768){document.getElementById("sidebarOverlay").classList.add("hidden");setSidebar(localStorage.getItem("sidebarOpen")!=="false");}else setSidebar(false);});
}
function handleLogout(){localStorage.clear();sessionStorage.clear();window.location.href="login.html";}

async function loadPatientRecords(){
    if(!token){window.location.href="login.html";return;}
    try{
        const [profileRes,patientsRes,apptRes]=await Promise.all([
            fetch(`${API}/api/Doctor/profile`,  {headers:{Authorization:`Bearer ${token}`}}),
            fetch(`${API}/api/Doctor/patients`, {headers:{Authorization:`Bearer ${token}`}}),
            fetch(`${API}/api/Doctor/appointments/upcoming`,{headers:{Authorization:`Bearer ${token}`}})
        ]);
        const profile=await profileRes.json(),patients=await patientsRes.json(),appts=await apptRes.json();
        const d=profile.data,name=d.user.fullName,spec=d.specialization;
        const imgUrl=d.doctorProfileImageUrl||d.user?.userProfileImageUrl;

        document.getElementById("doctorName").innerText=name;
        document.getElementById("doctorId").innerText="Doctor ID: "+d.id;
        document.getElementById("doctorSpec").innerText=spec;
        document.getElementById("doctorBio").innerText=d.bio??"";
        document.getElementById("doctorMiniName").innerText=name;
        document.getElementById("doctorMiniSpec").innerText=spec;
        document.getElementById("sidebarName").innerText=name;
        document.getElementById("sidebarSpec").innerText=spec;

        if(imgUrl){
            const img=`<img src="${imgUrl}" class="w-full h-full object-cover"/>`;
            ["profileAvatar","sidebarAvatar","headerAvatar"].forEach(id=>document.getElementById(id).innerHTML=img);
        }

        document.getElementById("patientCount").innerText=`${patients.count} patients`;
        const table=document.getElementById("patientsTableBody");
        table.innerHTML=!patients.data.length
            ?`<tr><td colspan="4" class="px-6 py-4 text-slate-400 text-sm">No patients found.</td></tr>`
            :patients.data.map(p=>`<tr class="hover:bg-slate-50/50">
                <td class="px-6 py-4"><div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center flex-shrink-0"><span class="material-symbols-outlined text-slate-400 text-sm" style='font-variation-settings:"FILL" 1;'>person</span></div><span class="text-sm font-semibold text-primary">${p.fullName}</span></div></td>
                <td class="px-6 py-4 text-sm text-slate-600">${p.phone??"-"}</td>
                <td class="px-6 py-4 text-sm text-slate-600">${p.email??"-"}</td>
                <td class="px-6 py-4 text-sm text-slate-600">${p.gender??"-"}</td>
            </tr>`).join("");

        const upcoming=document.getElementById("upcomingAppointments");
        upcoming.innerHTML=!appts.data.length
            ?`<p class="text-slate-400 text-sm">No upcoming appointments.</p>`
            :appts.data.map(a=>{const d=new Date(a.appointmentDate);return`<div class="p-3 bg-slate-50 border border-slate-100 rounded-lg"><div class="flex justify-between mb-1"><span class="text-sm font-bold text-primary">${d.toLocaleDateString()}</span><span class="text-[12px] font-bold text-slate-500">${d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span></div><p class="text-sm font-medium text-slate-600">${a.patientName??"Unknown"}</p><span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-slate-200 text-slate-600 mt-1 inline-block">${a.status}</span></div>`;}).join("");
    }catch(err){console.error(err);}
}

initSidebar();
loadPatientRecords();
    </script>
</body>
</html>
