<body class="antialiased text-on-surface font-manrope">
<!-- SideNavBar -->
<aside class="fixed left-0 top-0 h-full w-64 bg-white border-r border-slate-200 flex flex-col py-8 px-4 z-50">
<div class="mb-12 px-4 flex items-center gap-3">
<div class="w-9 h-9 rounded-lg bg-primary flex items-center justify-center shadow-sm">
    <span class="material-symbols-outlined text-white text-xl" style='font-variation-settings: "FILL" 1;'>medical_services</span>
</div>
<span class="text-xl font-800 tracking-tight text-slate-900" style="">SehhaTech</span>
</div>
<nav class="flex-1 space-y-1.5">
<a class="flex items-center gap-3 px-4 py-3 sidebar-item-active font-semibold rounded-lg transition-all duration-200" href="doctor-dashboard.html" style="">
<span class="material-symbols-outlined text-[22px]" data-icon="dashboard" style="">dashboard</span>
<span class="text-sm" style="">Dashboard</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-all duration-200" href="my schedule.html" style="">
<span class="material-symbols-outlined text-[22px]" data-icon="calendar_today" style="">calendar_today</span>
<span class="text-sm font-medium" style="">My Schedule</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-all duration-200" href="patients records.html" style="">
<span class="material-symbols-outlined text-[22px]" data-icon="folder_shared" style="">folder_shared</span>
<span class="text-sm font-medium" style="">Patient Records</span>
</a>
</nav>
<div class="mt-auto pt-6 border-t border-slate-100 space-y-6">
<a class="flex items-center gap-3 px-4 py-2 text-slate-500 hover:text-error transition-colors" href="login.html" style="">
<span class="material-symbols-outlined text-[22px]" data-icon="logout" style="">logout</span>
<span class="text-sm font-medium" style="">Logout</span>
</a>
</div>
</aside>
<!-- TopNavBar -->
<header class="fixed top-0 right-0 left-64 h-16 border-b border-slate-200 bg-white/80 backdrop-blur-md z-40 flex justify-between items-center px-8">
<div class="flex items-center gap-4 flex-1">
<div class="relative w-full max-w-md">

</div>
</div>
<div class="flex items-center gap-6">
<div class="flex items-center gap-3">
    <div class="text-right">
        <p id="doctorName"
           class="text-xs font-bold text-slate-900">
        </p>

        <p id="doctorSpecialization"
           class="text-[10px] text-slate-400 font-semibold uppercase">
        </p>
    </div>

</div>
</div>
</header>
<!-- Main Content -->
<main class="ml-64 pt-16 min-h-screen">
<div class="p-10 max-w-[1400px] mx-auto space-y-10">
<!-- Header Section -->
<div class="flex justify-between items-end">
<div>

<p id="dashboardDate"
   class="text-slate-500 font-medium mt-1">
</p>
</div>
<div class="flex gap-3">
</div>
</div>
<!-- Single Metric Card -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-gutter">
<div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-subtle hover:shadow-card transition-shadow flex flex-col justify-between h-40">
<div class="flex justify-between items-start">
<div>
<span class="text-[11px] font-800 text-slate-400 uppercase tracking-widest" style="">APPOINTMENTS TODAY</span>
<div class="mt-2 flex items-baseline gap-2">
    <span id="appointmentsCount" class="text-4xl font-800 text-slate-900">0</span>

</div>
</div>
<div class="p-3 bg-slate-50 rounded-xl text-slate-900">
<span class="material-symbols-outlined text-2xl" style='font-variation-settings: "FILL" 1;'>calendar_month</span>
</div>
</div>
<div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
<div class="bg-primary h-full w-[65%]" style="width: 75%"></div>
</div>
</div>
</div>
<!-- Dashboard Grid -->
<div class="grid grid-cols-12 gap-gutter">
<!-- Left: Main Clinical Flow (8 cols) -->
<div class="col-span-12 lg:col-span-8 space-y-gutter">
<!-- Upcoming Appointments -->
<section class="bg-white rounded-2xl border border-slate-200 shadow-subtle overflow-hidden">
<div class="p-6 border-b border-slate-100 flex justify-between items-center">
<h2 class="text-lg font-700 text-slate-900 flex items-center gap-2.5" style="">
<span class="material-symbols-outlined text-primary text-xl" style="">event_list</span>
                                Upcoming Appointments
                            </h2>
<a href="my schedule.html"
   class="text-primary text-sm font-700 hover:underline">
    View Full Schedule
</a>
</div>
<div class="divide-y divide-slate-50">
    <div id="appointmentsContainer"></div>
</div>
</section>
<!-- Recent Patients -->
<section class="space-y-5">
<div class="flex justify-between items-center">
<h2 class="text-lg font-700 text-slate-900 flex items-center gap-2.5" style="">
<span class="material-symbols-outlined text-primary text-xl" style="">recent_actors</span>
                                Recent Patients
                            </h2>
<button onclick="window.location.href='patients records.html'"
        class="text-slate-500 text-xs font-700 hover:text-slate-900 transition-colors">
    See All
</button>
</div>
<div id="recentPatientsContainer"
     class="grid grid-cols-1 md:grid-cols-3 gap-md">
</div>
</section>
</div>
<!-- Right: Daily Timeline (4 cols) -->
<div class="col-span-12 lg:col-span-4">
<section class="bg-white rounded-2xl border border-slate-200 shadow-subtle h-full">
<div class="p-6 border-b border-slate-100">
<h2 class="text-lg font-700 text-slate-900 flex items-center gap-2.5" style="">
<span class="material-symbols-outlined text-primary text-xl" style="">schedule</span>
                                Daily Timeline
                            </h2>
</div>
<div class="p-8">
    <div id="timelineContainer"></div>
</div>
</section>
</div>
</div>
</div>
</main>
<!-- Contextual FAB -->
<script>
    async function loadDashboard() {
        const token = localStorage.getItem("token");

        if (!token) {
            window.location.href = "login.html";
            return;
        }
        const response = await fetch(
            "http://localhost:5099/api/Doctor/dashboard",
            {
                headers: {
                    Authorization: `Bearer ${localStorage.getItem("token")}`
                }
            });

        const result = await response.json();
        const profileResponse = await fetch(
            "http://localhost:5099/api/Doctor/profile",
            {
                headers: {
                    Authorization: `Bearer ${localStorage.getItem("token")}`
                }
            });

        const profile = await profileResponse.json();
        document.getElementById("doctorName").innerText =
            profile.data.user.fullName;

        document.getElementById("doctorSpecialization").innerText =
            profile.data.specialization;

        document.getElementById("appointmentsCount").innerText =
            result.data.appointmentsTodayCount;

        const container =
            document.getElementById("appointmentsContainer");

        container.innerHTML = "";

        result.data.upcomingAppointments.forEach(a => {

            container.innerHTML += `
            <div class="px-6 py-5 border-b border-slate-100">
                <div class="font-bold text-slate-900">
                    ${a.patientName}
                </div>

                <div class="text-sm text-slate-500 mt-1">
                    ${new Date(a.appointmentDate).toLocaleString()}
                </div>

                <div class="text-sm mt-1">
                    Status: ${a.status}
                </div>
            </div>
        `;
        });
        const today = new Date();

        document.getElementById("dashboardDate").innerText =
            `Daily clinical overview for ${today.toLocaleDateString(
                "en-US",
                {
                    year: "numeric",
                    month: "long",
                    day: "numeric"
                }
            )}`;
        const patientsContainer =
            document.getElementById("recentPatientsContainer");

        patientsContainer.innerHTML = "";

        result.data.recentPatients.forEach(p => {

            patientsContainer.innerHTML += `
        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-subtle">

            <h4 class="font-bold text-slate-900">
                ${p.fullName}
            </h4>

            <p class="text-sm text-slate-500 mt-2">
                ${p.phone}
            </p>

            <p class="text-xs text-slate-400 mt-2">
                Patient ID: ${p.id}
            </p>

        </div>
    `;
        });
        const timelineContainer =
            document.getElementById("timelineContainer");

        timelineContainer.innerHTML = "";

        result.data.dailyTimeline.forEach(item => {

            timelineContainer.innerHTML += `
        <div class="mb-4 p-3 border-b border-slate-100">

            <div class="font-bold text-slate-900">
                ${new Date(item.appointmentDate)
                    .toLocaleTimeString([], {
                        hour: '2-digit',
                        minute: '2-digit'
                    })}
            </div>

            <div class="text-sm text-slate-600 mt-1">
                ${item.patientName}
            </div>

            <div class="text-xs text-slate-400 mt-1">
                ${item.status}
            </div>

        </div>
    `;
        });

    }

    loadDashboard();
</script>
</body></html>
