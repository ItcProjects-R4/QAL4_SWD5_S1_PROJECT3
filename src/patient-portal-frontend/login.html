    <!-- Interactive Background Script -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const canvas = document.getElementById('medical-crosses-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let crosses = [];
            let mouse = { x: -1000, y: -1000 };

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initCrosses();
            }

            window.addEventListener('resize', resize);
            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            window.addEventListener('mouseout', () => {
                mouse.x = -1000;
                mouse.y = -1000;
            });

            class Cross {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 15 + 5;
                    this.baseAlpha = Math.random() * 0.1 + 0.02;
                    this.alpha = this.baseAlpha;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.color = '#005c9b'; // Primary blue
                }

                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;

                    const thickness = this.size * 0.3;
                    const length = this.size;

                    // Draw cross
                    ctx.fillRect(-length/2, -thickness/2, length, thickness); // Horizontal
                    ctx.fillRect(-thickness/2, -length/2, thickness, length); // Vertical

                    ctx.restore();
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;

                    // Wrap around
                    if (this.x < -this.size) this.x = width + this.size;
                    if (this.x > width + this.size) this.x = -this.size;
                    if (this.y < -this.size) this.y = height + this.size;
                    if (this.y > height + this.size) this.y = -this.size;

                    // Mouse interaction
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const interactionRadius = 150;

                    if (distance < interactionRadius) {
                        const force = (interactionRadius - distance) / interactionRadius;
                        // Push away slightly
                        this.x -= dx * force * 0.05;
                        this.y -= dy * force * 0.05;
                        // Increase opacity based on proximity
                        this.alpha = Math.min(this.baseAlpha + (force * 0.2), 0.4);
                    } else {
                        // Return to base alpha
                        this.alpha += (this.baseAlpha - this.alpha) * 0.05;
                    }

                    this.draw();
                }
            }

            function initCrosses() {
                crosses = [];
                const numCrosses = Math.floor((width * height) / 15000); // Density
                for (let i = 0; i < numCrosses; i++) {
                    crosses.push(new Cross());
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                crosses.forEach(cross => cross.update());
                requestAnimationFrame(animate);
            }

            resize();
            animate();
        });
    </script>

    <script>
  const form = document.querySelector('form');
  const loginBtn = form.querySelector('button[type="submit"]');

  // Validation error helpers
  function showError(fieldId, message) {
    const field = document.getElementById(fieldId);
    field.classList.add('border-error');
    field.classList.remove('border-outline-variant');
    let error = document.getElementById(fieldId + '-error');
    if (!error) {
      error = document.createElement('p');
      error.id = fieldId + '-error';
      error.className = 'font-label-sm text-label-sm text-error';
      field.parentElement.appendChild(error);
    }
    error.textContent = message;
  }

  function clearError(fieldId) {
    const field = document.getElementById(fieldId);
    field.classList.remove('border-error');
    field.classList.add('border-outline-variant');
    const error = document.getElementById(fieldId + '-error');
    if (error) error.textContent = '';
  }

  // Blur validation
  document.getElementById('phone').addEventListener('blur', () => {
    const val = document.getElementById('phone').value.trim();
    if (!/^(01[0125][0-9]{8})$/.test(val)) {
      showError('phone', 'Invalid Egyptian phone number');
    } else clearError('phone');
  });

  document.getElementById('password').addEventListener('blur', () => {
    if (document.getElementById('password').value.length < 8) {
      showError('password', 'Password must be at least 8 characters');
    } else clearError('password');
  });

  // Submit
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;

    let hasError = false;
    if (!/^(01[0125][0-9]{8})$/.test(phone)) { showError('phone', 'Invalid Egyptian phone number'); hasError = true; }
    else clearError('phone');
    if (password.length < 8) { showError('password', 'Password must be at least 8 characters'); hasError = true; }
    else clearError('password');
    if (hasError) return;

    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';

    try {
      const response = await fetch('http://localhost:5238/api/portal/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, password })
      });

      const data = await response.json();

      if (response.ok) {
        localStorage.setItem('accessToken', data.data.accessToken);
        localStorage.setItem('refreshToken', data.data.refreshToken);
        localStorage.setItem('patientName', data.data.fullName);
        localStorage.setItem('patientPhone', data.data.phone);
        window.location.href = 'clinics.html';
      } else {
        showGeneralError(data.message || 'Login failed. Please try again.');
      }
    } catch (err) {
      showGeneralError('Connection error. Please try again.');
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    }
  });

  function showGeneralError(message) {
    let el = document.getElementById('general-error');
    if (!el) {
      el = document.createElement('p');
      el.id = 'general-error';
      el.className = 'font-label-sm text-label-sm text-error text-center';
      form.appendChild(el);
    }
    el.textContent = message;
  }

  // Password show/hide
  const toggleBtn = document.querySelector('button[aria-label="Toggle password visibility"]');
  const passwordInput = document.getElementById('password');
  toggleBtn.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    toggleBtn.querySelector('span').textContent = isPassword ? 'visibility_off' : 'visibility';
  });

  // Links
  document.querySelector('a[href="#"]').href = 'register.html';
    </script>
