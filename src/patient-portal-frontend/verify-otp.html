    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.otp-input');
            const verifyBtn = document.getElementById('verify-btn');
            const timerDisplay = document.getElementById('timer');
            const resendBtn = document.getElementById('resend-btn');

            // OTP Input Logic
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value.length > 1) {
                        e.target.value = e.target.value.slice(0, 1);
                    }
                    if (e.target.value !== '') {
                        if (index < inputs.length - 1) {
                            inputs[index + 1].disabled = false;
                            inputs[index + 1].focus();
                        }
                    }
                    checkOTPComplete();
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value === '') {
                        if (index > 0) {
                            inputs[index - 1].focus();
                        }
                    }
                });
            });

            function checkOTPComplete() {
                let complete = true;
                inputs.forEach(input => {
                    if (input.value === '') complete = false;
                });
                verifyBtn.disabled = !complete;
            }

            // Timer Logic
            let timeLeft = 120; // 2 minutes
            let timerId = setInterval(() => {
                timeLeft--;
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;

                timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerDisplay.textContent = "00:00";
                    resendBtn.disabled = false;
                    resendBtn.classList.remove('text-secondary', 'cursor-not-allowed', 'opacity-50');
                    resendBtn.classList.add('text-primary', 'cursor-pointer', 'hover:underline');
                }
            }, 1000);

            resendBtn.addEventListener('click', () => {
                if(!resendBtn.disabled) {
                    // Reset timer visual
                    timeLeft = 120;
                    resendBtn.disabled = true;
                    resendBtn.classList.add('text-secondary', 'cursor-not-allowed', 'opacity-50');
                    resendBtn.classList.remove('text-primary', 'cursor-pointer', 'hover:underline');
                    // In a real app, you would trigger the resend API here
                    alert("OTP Resent!");
                }
            });

            // Initial Check
            checkOTPComplete();
        });
    </script>

    <script>
  // اعرض الـ phone من الـ register
  const phone = sessionStorage.getItem('registerPhone') || '010xxxxxxx';
  document.querySelector('strong').textContent = phone;

  const verifyBtn = document.getElementById('verify-btn');
  const resendBtn = document.getElementById('resend-btn');
  const inputs = document.querySelectorAll('.otp-input');

  // Verify Button
  verifyBtn.addEventListener('click', async () => {
    const code = Array.from(inputs).map(i => i.value).join('');

    verifyBtn.disabled = true;
    verifyBtn.textContent = 'Verifying...';

    try {
      const response = await fetch('http://localhost:5238/api/portal/auth/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, code, purpose: 0 })
      });

      const data = await response.json();

      if (response.ok) {
        // حفظ الـ tokens
        localStorage.setItem('accessToken', data.data.accessToken);
        localStorage.setItem('refreshToken', data.data.refreshToken);
        localStorage.setItem('patientName', data.data.fullName);
        localStorage.setItem('patientPhone', data.data.phone);
        // الانتقال للـ clinics
        window.location.href = 'clinics.html';
      } else {
        showError(data.message || 'Invalid OTP. Please try again.');
        verifyBtn.disabled = false;
        verifyBtn.textContent = 'Verify';
      }
    } catch (err) {
      showError('Connection error. Please try again.');
      verifyBtn.disabled = false;
      verifyBtn.textContent = 'Verify';
    }
  });

  // Resend Button
  resendBtn.addEventListener('click', async () => {
    if (resendBtn.disabled) return;

    try {
      const response = await fetch('http://localhost:5238/api/portal/auth/resend-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, purpose: 0 })
      });

      if (response.ok) {
        showSuccess('OTP resent successfully!');
      } else {
        showError('Failed to resend OTP.');
      }
    } catch (err) {
      showError('Connection error.');
    }
  });

  function showError(message) {
    let el = document.getElementById('otp-message');
    if (!el) {
      el = document.createElement('p');
      el.id = 'otp-message';
      document.getElementById('otp-form').appendChild(el);
    }
    el.className = 'font-label-sm text-label-sm text-error text-center';
    el.textContent = message;
  }

  function showSuccess(message) {
    let el = document.getElementById('otp-message');
    if (!el) {
      el = document.createElement('p');
      el.id = 'otp-message';
      document.getElementById('otp-form').appendChild(el);
    }
    el.className = 'font-label-sm text-label-sm text-primary text-center';
    el.textContent = message;
  }
    </script>
